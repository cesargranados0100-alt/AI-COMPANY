name: Auto Blog Generator (sin tokens)

on:
  schedule:
    # Lunes, miércoles y viernes a las 9am Colombia (2pm UTC)
    - cron: '0 14 * * 1'
    - cron: '0 14 * * 3'
    - cron: '0 14 * * 5'
  workflow_dispatch:
    inputs:
      count:
        description: 'Número de artículos a generar (default: 1)'
        required: false
        default: '1'

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog posts (cero tokens)
        run: |
          COUNT=${{ github.event.inputs.count || '1' }}
          echo "Generando $COUNT artículos sin IA..."
          for i in $(seq 1 $COUNT); do
            echo "=== Artículo $i/$COUNT ==="
            node scripts/generate-blog-template.js || echo "⚠️ Error en artículo $i"
          done

      - name: Commit and push
        run: |
          git config user.name "AI Company Blog Bot"
          git config user.email "cesargranados0100@gmail.com"
          git add blog/ sitemap-seo.xml sitemap-main.xml
          git diff --staged --quiet || git commit -m "blog: ${{ github.event.inputs.count || '1' }} artículo(s) nuevos [skip ci]"
          git push

      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://aicompanyco.com/sitemap.xml" || true
          curl -s "https://www.google.com/ping?sitemap=https://aicompanyco.com/sitemap-main.xml" || true
          echo "✅ Google notificado"

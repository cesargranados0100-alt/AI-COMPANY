name: Auto Blog Generator (Claude)

on:
  schedule:
    # Lunes, miércoles y viernes a las 9am Colombia (2pm UTC)
    - cron: '0 14 * * 1'
    - cron: '0 14 * * 3'
    - cron: '0 14 * * 5'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate blog post
        id: generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: node scripts/generate-blog.js

      - name: Commit and push
        run: |
          git config user.name "AI Company Blog Bot"
          git config user.email "cesargranados0100@gmail.com"
          git add blog/ sitemap-seo.xml sitemap-main.xml
          git diff --staged --quiet || git commit -m "blog: nuevo artículo [skip ci]"
          git push

      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://aicompanyco.com/sitemap.xml" || true
          curl -s "https://www.google.com/ping?sitemap=https://aicompanyco.com/sitemap-main.xml" || true
          echo "✅ Google notificado"

      - name: Reportar uso de tokens a mi-plataforma
        if: steps.generator.outputs.new_post == 'true'
        env:
          SEO_NOTIFY_SECRET: ${{ secrets.SEO_NOTIFY_SECRET }}
          PLATAFORMA_URL: ${{ secrets.PLATAFORMA_URL }}
        run: |
          curl -s -X POST "${PLATAFORMA_URL}/api/seo/registrar-uso" \
            -H "Content-Type: application/json" \
            -H "x-seo-secret: ${SEO_NOTIFY_SECRET}" \
            -d "{\"input_tokens\": ${{ steps.generator.outputs.input_tokens }}, \"output_tokens\": ${{ steps.generator.outputs.output_tokens }}}" \
            && echo "✅ Uso registrado" || echo "⚠️ No se pudo registrar uso"

      - name: Notificar Telegram para indexación
        if: steps.generator.outputs.new_post == 'true'
        env:
          SEO_NOTIFY_SECRET: ${{ secrets.SEO_NOTIFY_SECRET }}
          PLATAFORMA_URL: ${{ secrets.PLATAFORMA_URL }}
        run: |
          curl -s -X POST "${PLATAFORMA_URL}/api/seo/notificar-articulo" \
            -H "Content-Type: application/json" \
            -H "x-seo-secret: ${SEO_NOTIFY_SECRET}" \
            -d "{\"titulo\": \"${{ steps.generator.outputs.titulo }}\", \"slug\": \"${{ steps.generator.outputs.slug }}\", \"tipo\": \"blog\"}" \
            && echo "✅ Telegram notificado" || echo "⚠️ Telegram no disponible"

      - name: Alerta Telegram si Claude falló
        if: failure() && steps.generator.outcome == 'failure'
        env:
          SEO_NOTIFY_SECRET: ${{ secrets.SEO_NOTIFY_SECRET }}
          PLATAFORMA_URL: ${{ secrets.PLATAFORMA_URL }}
        run: |
          curl -s -X POST "${PLATAFORMA_URL}/api/seo/alerta" \
            -H "Content-Type: application/json" \
            -H "x-seo-secret: ${SEO_NOTIFY_SECRET}" \
            -d '{"tipo": "tokens_agotados"}' \
            && echo "✅ Alerta enviada" || echo "⚠️ No se pudo enviar alerta"

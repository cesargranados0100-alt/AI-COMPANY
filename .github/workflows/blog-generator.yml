name: Auto Blog Generator

on:
  schedule:
    # Every Monday and Thursday at 1:00 PM UTC = 8:00 AM Colombia (UTC-5)
    - cron: '0 13 * * 1'
    - cron: '0 13 * * 4'
  workflow_dispatch:
    inputs:
      count:
        description: 'Número de artículos a generar (default: 1)'
        required: false
        default: '1'

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: |
          COUNT=${{ github.event.inputs.count || '1' }}
          echo "Generando $COUNT artículos..."
          for i in $(seq 1 $COUNT); do
            echo "=== Artículo $i/$COUNT ==="
            node scripts/generate-blog.js || echo "⚠️ Error en artículo $i, continuando..."
            sleep 2
          done

      - name: Commit and push new posts
        run: |
          git config user.name "AI Company Blog Bot"
          git config user.email "cesargranados0100@gmail.com"
          git add blog/ sitemap-seo.xml sitemap-main.xml
          git diff --staged --quiet || git commit -m "blog: auto-publish ${{ github.event.inputs.count || '1' }} post(s) [skip ci]"
          git push

      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://aicompanyco.com/sitemap.xml" || true
          curl -s "https://www.google.com/ping?sitemap=https://aicompanyco.com/sitemap-main.xml" || true
          echo "✅ Google notificado"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 530" width="500" height="530">
  <defs>
    <linearGradient id="g1" x1="5%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%"   stop-color="#bb40ff"/>
      <stop offset="20%"  stop-color="#e065ff"/>
      <stop offset="42%"  stop-color="#8800cc"/>
      <stop offset="62%"  stop-color="#cc44ff"/>
      <stop offset="80%"  stop-color="#7700bb"/>
      <stop offset="100%" stop-color="#9922ee"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#dd55ff"/>
      <stop offset="38%"  stop-color="#9900cc"/>
      <stop offset="72%"  stop-color="#bb33ff"/>
      <stop offset="100%" stop-color="#6600aa"/>
    </linearGradient>
    <radialGradient id="og" cx="35%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#f5bbff"/>
      <stop offset="28%"  stop-color="#cc55ee"/>
      <stop offset="65%"  stop-color="#8800cc"/>
      <stop offset="100%" stop-color="#5500aa"/>
    </radialGradient>
    <filter id="gl" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ogl" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- OUTER BIG TRIANGLE -->
  <polygon
    points="248,46  41,406  462,406"
    fill="none"
    stroke="url(#g1)"
    stroke-width="20"
    stroke-linejoin="miter"
    stroke-miterlimit="14"
    filter="url(#gl)"
  />

  <!-- INNER TRIANGLE — apex is lower (y=106), not at outer apex -->
  <polygon
    points="209,106  59,376  360,376"
    fill="none"
    stroke="url(#g2)"
    stroke-width="14"
    stroke-linejoin="miter"
    stroke-miterlimit="12"
    filter="url(#gl)"
  />

  <!-- ANTENNA: from inner apex (209,106) to orb (261,48) -->
  <line
    x1="209" y1="106"
    x2="261" y2="50"
    stroke="url(#g1)"
    stroke-width="14"
    stroke-linecap="round"
    filter="url(#gl)"
  />

  <!-- NOTCH: small open V at bottom right -->
  <!-- inner BR (360,376) → peak(393,352) → outer right(425,376) -->
  <polyline
    points="360,376  393,352  425,376"
    fill="none"
    stroke="url(#g1)"
    stroke-width="14"
    stroke-linejoin="miter"
    stroke-linecap="butt"
    filter="url(#gl)"
  />

  <!-- ORB -->
  <circle cx="261" cy="44" r="21" fill="url(#og)" filter="url(#ogl)"/>

  <!-- "AI Company" TEXT -->
  <text x="255" y="492"
    text-anchor="middle"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-weight="900" font-size="60" fill="#5500aa" letter-spacing="1">
    AI Company
  </text>
</svg>
